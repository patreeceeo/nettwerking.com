<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clojure Web App</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "IBM Plex Sans", "Helvetica Neue", sans-serif;
        --color-background: #f6f1e7;
        --color-surface: #fffdfa;
        --color-text: #231f1a;
        --color-text-muted: #675e55;
        --color-accent: #aa4d22;
        --color-success: #1f6b44;
        --color-partial: #996515;
        --color-error: #9b2c2c;
        --color-selection: #231f1a;
      }

      body {
        margin: 0;
        padding: 2rem;
        background: linear-gradient(180deg, #f2eadb 0%, var(--color-background) 100%);
        color: var(--color-text);
      }

      button {
        font: inherit;
      }

      .editor-shell {
        max-width: 72rem;
        margin: 0 auto;
      }

      .orientation-header {
        margin-bottom: 1.5rem;
      }

      .orientation-header h1 {
        margin: 0 0 0.35rem;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        font-size: 2.4rem;
      }

      .orientation-copy,
      .selection-copy,
      .status-summary,
      .status-next-step,
      .node-meta,
      .branch-label {
        color: var(--color-text-muted);
      }

      .workspace-grid {
        display: grid;
        grid-template-columns: minmax(0, 2fr) minmax(16rem, 1fr);
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .tree-panel,
      .status-panel,
      .action-rail {
        background: color-mix(in srgb, var(--color-surface) 92%, white);
        border: 1px solid rgba(35, 31, 26, 0.14);
        border-radius: 0.65rem;
        padding: 1rem;
      }

      .panel-heading {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.75rem;
        color: var(--color-text-muted);
      }

      .tree-root,
      .tree-children {
        display: grid;
        gap: 0.75rem;
      }

      .tree-call {
        border-left: 2px solid rgba(35, 31, 26, 0.14);
        padding-left: 0.85rem;
      }

      .node-button {
        display: inline-flex;
        align-items: baseline;
        gap: 0.45rem;
        width: auto;
        text-align: left;
        background: transparent;
        border: 1px solid rgba(35, 31, 26, 0.18);
        border-radius: 0.5rem;
        padding: 0.55rem 0.7rem;
        color: var(--color-text);
      }

      .node-hole {
        border-style: dashed;
      }

      .selected-node,
      .node-button:focus-visible {
        outline: 3px solid rgba(170, 77, 34, 0.18);
        border-color: var(--color-selection);
        box-shadow: 0 0 0 2px rgba(35, 31, 26, 0.25);
      }

      .node-value,
      .result-value,
      .status-kind {
        font-weight: 600;
      }

      .status-kind {
        margin-bottom: 0.5rem;
      }

      .result-value {
        margin-top: 1rem;
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
      }

      .status-live {
        position: absolute;
        left: -9999px;
      }

      .action-rail {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      .action-rail .panel-heading {
        width: 100%;
      }

      .action-button {
        border: 1px solid rgba(35, 31, 26, 0.18);
        background: rgba(255, 255, 255, 0.72);
        border-radius: 999px;
        padding: 0.45rem 0.9rem;
      }

      .action-button[disabled] {
        opacity: 0.5;
      }

      @media (max-width: 720px) {
        body {
          padding: 1rem;
        }

        .workspace-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="/js/main.js"></script>
  </body>
</html>
