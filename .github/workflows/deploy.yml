name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
  DEPLOY_USER: ${{ vars.DEPLOY_USER || 'ubuntu' }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/fullstack_clojure' }}
  APP_PORT: ${{ vars.APP_PORT || '8080' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Build frontend assets
        run: make frontend-build

      - name: Create deployment archive
        run: |
          archive_path="/tmp/${GITHUB_SHA}.tar.gz"
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.cpcache \
            --exclude=.shadow-cljs \
            -czf "$archive_path" .
          printf 'ARCHIVE_PATH=%s\n' "$archive_path" >> "$GITHUB_ENV"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "
            set -eu
            mkdir -p '$DEPLOY_PATH/releases' '$DEPLOY_PATH/shared'
          "
          scp -i ~/.ssh/deploy_key "$ARCHIVE_PATH" \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/releases/${GITHUB_SHA}.tar.gz"

      - name: Activate release
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" "
            set -eu

            release_dir='$DEPLOY_PATH/releases/$GITHUB_SHA'
            archive_path='$DEPLOY_PATH/releases/$GITHUB_SHA.tar.gz'
            current_link='$DEPLOY_PATH/current'
            log_path='$DEPLOY_PATH/shared/app.log'
            pid_path='$DEPLOY_PATH/shared/app.pid'

            rm -rf \"\$release_dir\"
            mkdir -p \"\$release_dir\"
            tar -xzf \"\$archive_path\" -C \"\$release_dir\"
            ln -sfn \"\$release_dir\" \"\$current_link\"

            if [ -f \"\$pid_path\" ] && kill -0 \"\$(cat \"\$pid_path\")\" 2>/dev/null; then
              kill \"\$(cat \"\$pid_path\")\"
              sleep 2
            fi

            cd \"\$current_link\"
            nohup env PORT='$APP_PORT' clojure -M:run >> \"\$log_path\" 2>&1 &
            echo \$! > \"\$pid_path\"
          "
